user root;
worker_processes auto;
error_log /var/log/nginx/error.log info;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /usr/local/openresty/nginx/conf/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Lua package path for FailedRequestTrace modules
  lua_package_path "/app/lua/?.lua;/app/lua/?/init.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;;";
  lua_package_cpath "/usr/local/openresty/lualib/?.so;/usr/local/openresty/lualib/loadall.so;;";

  # Initialize FailedRequestTrace at startup
  init_by_lua_block {
    frt = require "failed_request_trace"

    frt.init({
        output_format = "json",

        request_headers_allowlist = {
            "host",
            "user-agent",
            "accept",
            "accept-encoding",
            "accept-language",
            "content-type",
            "content-length",
            "origin",
            "referer",
            "referrer",
            "x-forwarded-for",
            "x-forwarded-proto",
            "x-forwarded-host",
            "x-real-ip",
            "x-request-id",
            "x-correlation-id",
            "authorization",
            "cookie",
            "cf-connecting-ip",
            "true-client-ip"
        },

        response_headers_allowlist = {
            "content-type",
            "content-length",
            "location",
            "server",
            "date",
            "x-request-id",
            "x-correlation-id",
            "cache-control",
            "set-cookie"
        },

        request_headers_unredacted = {
            -- Users can specify additional headers to redact or allow here
            "authorization"
        }
    })
 }

  server {
    listen 8080;
    server_name _;

    # Root directory for the sample site
    root /usr/share/nginx/html;
    index index.html;

    # Rewrite phase: Initialize request context and ID
    rewrite_by_lua_block {
      local frt = require("failed_request_trace")
      frt.rewrite()
    }

    # Access phase: Capture request data
    access_by_lua_block {
      local frt = require("failed_request_trace")
      frt.access()
    }

    location / {
      try_files $uri $uri.html $uri/ =404;
    }

    # Static assets location (CSS, JS, images)
    location /assets/ {
      expires 1h;
      add_header Cache-Control "public, immutable";
    }

    # Header filter phase: Capture response headers and status
    header_filter_by_lua_block {
      local frt = require("failed_request_trace")
      frt.header_filter()
    }
  }

  # Log phase: Capture timing and emit trace (global to all servers)
  log_by_lua_block {
    local frt = require("failed_request_trace")
    frt.log()
  }
}
