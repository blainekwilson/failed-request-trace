<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error - Sample Site</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container">
    <h2>Login Error</h2>
    
    <div style="background: #f8d7da; color: #721c24; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #f5c6cb;">
      ✗ An error occurred during login
    </div>
    
    <div style="background: #f8f9fa; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #dc3545;">
      <p style="color: #555; margin-bottom: 8px; font-size: 14px;"><strong>What happened:</strong></p>
      <p style="color: #666; font-size: 14px;">The login request failed. This could be due to a network error or server issue.</p>
    </div>
    
    <form method="GET" action="index.html">
      <button type="submit" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">Back to Login</button>
    </form>
  </div>
</body>
</html>
