# Example NGINX/OpenResty Configuration for FailedRequestTrace
#
# This example shows how to integrate FailedRequestTrace into your NGINX/OpenResty setup.
#
# Prerequisites:
# - OpenResty or NGINX with Lua module enabled
# - The failed_request_trace module accessible in lua_package_path

# Set the Lua package path to include the project root
lua_package_path "/path/to/project/lua/?.lua;;";

# Initialize FailedRequestTrace once at startup
init_by_lua_block {
  local frt = require("failed_request_trace")
  
  -- Initialize with default config
  frt.init()
  
  -- Or initialize with custom config:
  -- frt.init({
  --   enabled = true,
  --   output_format = "json",  -- "json" or "xml"
  --   capture_request_headers = true,
  --   capture_response_headers = true,
  -- })
}

server {
  listen 80;
  server_name example.com;

  location / {
    # Rewrite phase: Initialize request context and ID
    rewrite_by_lua_block {
      local frt = require("failed_request_trace")
      frt.rewrite()
    }

    # Access phase: Capture request data
    access_by_lua_block {
      local frt = require("failed_request_trace")
      frt.access()
    }

    # Route to upstream
    proxy_pass http://upstream_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Header filter phase: Capture response headers and status
    header_filter_by_lua_block {
      local frt = require("failed_request_trace")
      frt.header_filter()
    }
  }

  # Log phase: Capture timing and emit trace (applies to all locations in this server block)
  log_by_lua_block {
    local frt = require("failed_request_trace")
    frt.log()
  }
}

upstream upstream_backend {
  server 127.0.0.1:8080;
}

# Example curl requests to test:
#
# Basic request:
#   curl -i http://example.com/
#
# With custom request ID:
#   curl -i -H "X-Request-ID: my-trace-12345" http://example.com/
#
# With various headers:
#   curl -i -H "Accept: application/json" -H "X-Forwarded-For: 203.0.113.42" http://example.com/
#
# The trace will be logged to the NGINX error log at INFO level as structured JSON.
# Example output:
#   {
#     "timestamp": 1718342400,
#     "request_id": "669abc12-a1b2c3d4",
#     "request": {
#       "method": "GET",
#       "uri": "/",
#       "args": "",
#       "host": "example.com",
#       "headers": {
#         "host": "example.com",
#         "user-agent": "curl/7.68.0",
#         "accept": "*/*"
#       }
#     },
#     "response": {
#       "status": 200,
#       "upstream_status": "200",
#       "headers": {
#         "content-type": "text/html"
#       }
#     },
#     "timing": {
#       "request_time": 0.125,
#       "upstream_response_time": "0.120"
#     }
#   }
#
# Security notes:
# - Authorization, Cookie, Set-Cookie, X-API-Key headers are always redacted
# - Only allowlisted headers are captured (see config.lua)
# - Request bodies are not captured
# - Sensitive values in redacted headers appear as "[REDACTED]"
